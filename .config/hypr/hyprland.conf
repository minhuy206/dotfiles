
# This config is a STUB! This should never be generated.
# Use the lua config (hyprland.lua) — this file is kept only as a
# legacy/fallback reference. Variables and binds must stay in sync
# with hyprland.lua.

autogenerated = 1

$mainMod   = SUPER
$secondMod = SUPER SHIFT
$terminal   = kitty
$fileManager = nemo
$browser    = chromium
$launcher   = rofi -show drun -show-icons
$runner     = rofi -show run

# Applications
bind = $mainMod,   T,     exec, $terminal
bind = $mainMod,   F,     exec, $fileManager
bind = $mainMod,   E,     exec, $fileManager
bind = $mainMod,   B,     exec, $browser
bind = $mainMod,   SPACE, exec, $launcher
bind = $secondMod, SPACE, exec, $runner
bind = $mainMod,   R,     exec, $launcher

# Window management
bind = $mainMod,   Q, killactive,
bind = $mainMod,   P, pseudo,
bind = $secondMod, T, togglefloating,
bind = $secondMod, F, fullscreen, 1

# Exit
bind = $secondMod, M, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit

# Focus (vim-style)
bind = $mainMod, h, movefocus, l
bind = $mainMod, l, movefocus, r
bind = $mainMod, k, movefocus, u
bind = $mainMod, j, movefocus, d

# Move window
bind = $secondMod, h, movewindow, l
bind = $secondMod, l, movewindow, r
bind = $secondMod, k, movewindow, u
bind = $secondMod, j, movewindow, d

# Switch workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move window to workspace
bind = $secondMod, 1, movetoworkspace, 1
bind = $secondMod, 2, movetoworkspace, 2
bind = $secondMod, 3, exec, hyprshot -m output --clipboard-only
bind = $secondMod, 4, exec, hyprshot -m region --clipboard-only
bind = $secondMod, 5, movetoworkspace, 5
bind = $secondMod, 6, movetoworkspace, 6
bind = $secondMod, 7, movetoworkspace, 7
bind = $secondMod, 8, movetoworkspace, 8
bind = $secondMod, 9, movetoworkspace, 9
bind = $secondMod, 0, movetoworkspace, 10

# Scratchpad
bind = $mainMod,   S, togglespecialworkspace, magic
bind = $secondMod, S, movetoworkspace, special:magic

# Scroll workspaces
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up,   workspace, e-1

# Move/resize windows with mouse
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Multimedia keys
binde = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
binde = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl = , XF86AudioMute,        exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindl = , XF86AudioMicMute,     exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
binde = , XF86MonBrightnessUp,  exec, brightnessctl -e4 -n2 set 5%+
binde = , XF86MonBrightnessDown,exec, brightnessctl -e4 -n2 set 5%-
bindl = , XF86AudioNext,        exec, playerctl next
bindl = , XF86AudioPause,       exec, playerctl play-pause
bindl = , XF86AudioPlay,        exec, playerctl play-pause
bindl = , XF86AudioPrev,        exec, playerctl previous
