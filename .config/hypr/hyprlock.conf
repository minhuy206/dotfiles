general {
    hide_cursor = true
    immediate_render = true
}

background {
    monitor =
    path = ~/wallpapers/od_arch.png
    blur_size = 4
    blur_passes = 3
    brightness = 0.5
}

# Time
label {
    monitor =
    text = $TIME
    color = rgba(171, 178, 191, 1.0)
    font_size = 72
    font_family = JetBrainsMono Nerd Font
    position = 0, 120
    halign = center
    valign = center
}

# Date
label {
    monitor =
    text = cmd[update:60000] date +'%A, %B %d'
    color = rgba(171, 178, 191, 0.65)
    font_size = 18
    font_family = JetBrainsMono Nerd Font
    position = 0, 55
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 280, 48
    outline_thickness = 2
    dots_size = 0.30
    dots_spacing = 0.15
    dots_center = true
    outer_color = rgba(97, 175, 239, 0.8)
    inner_color = rgba(40, 44, 52, 0.95)
    font_color = rgba(171, 178, 191, 1.0)
    fade_on_empty = true
    placeholder_text = <i>Password</i>
    rounding = 8
    check_color = rgba(152, 195, 121, 1.0)
    fail_color = rgba(224, 140, 117, 1.0)
    fail_text = <i>$PAMFAIL</i>
    position = 0, -40
    halign = center
    valign = center
}
