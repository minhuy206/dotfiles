font_family JetBrainsMono Nerd Font
font_size 12

adjust_line_height 110%
adjust_column_width 0
symbol_map U+E000-U+F8FF Symbols Nerd Font Mono

macos_option_as_alt yes
copy_on_select clipboard
strip_trailing_spaces smart
enable_audio_bell no
confirm_os_window_close 0

background_opacity 0.8
window_padding_width 8
tab_bar_edge bottom
tab_bar_style powerline
tab_powerline_style slanted
active_tab_font_style bold
inactive_tab_font_style normal

foreground #e3e3e3
background #1a1b1c
selection_foreground #ffffff
selection_background #4a4b4c
cursor #ffffff
cursor_text_color #1a1b1c
cursor_blink_interval 0
url_color #8a8b8c

active_tab_foreground #1a1b1c
active_tab_background #8a8b8c
inactive_tab_foreground #e3e3e3
inactive_tab_background #2a2b2c
tab_bar_background #1a1b1c

active_border_color #6a6b6c
inactive_border_color #2a2b2c
bell_border_color #dfc195

color0 #1a1b1c
color1 #cf6a6a
