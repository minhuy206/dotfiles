set-option -g default-terminal "tmux-256color"
set-option -ga terminal-overrides ",xterm-256color:RGB"

set-option -g prefix C-a
unbind-key C-b
bind-key C-a send-prefix

set-option -g base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

set-option -g mouse on
set-option -g history-limit 50000
set-option -g escape-time 10
set-option -g focus-events on

bind-key T display-popup -E -w 80% -h 80% -d "#{pane_current_path}" "$SHELL"

setw -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

bind-key | split-window -h -c "#{pane_current_path}"
bind-key - split-window -v -c "#{pane_current_path}"
unbind-key '"'
unbind-key %

bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

bind-key -r H resize-pane -L 5
bind-key -r J resize-pane -D 5
bind-key -r K resize-pane -U 5
bind-key -r L resize-pane -R 5

bind-key c new-window -c "#{pane_current_path}"
bind-key r source-file ~/.tmux.conf \; display-message "Reloaded ~/.tmux.conf"

set-option -g status on
set-option -g status-interval 5
set-option -g status-position bottom
set-option -g status-style "bg=default,fg=#ffffff"
set-option -g status-left-length 40
set-option -g status-right-length 120
set-option -g status-left "#[fg=#a8ded7,bold] #S #[fg=#8a8b8c]|"
set-option -g status-right "#[fg=#8a8b8c]| #[fg=#a3bda3]%Y-%m-%d #[fg=#9cb6d2]%H:%M "

set-window-option -g window-status-style "fg=#e3e3e3,bg=default"
set-window-option -g window-status-format " #I:#W "
set-window-option -g window-status-current-style "fg=#1a1b1c,bg=#9cb6d2,bold"
set-window-option -g window-status-current-format " #I:#W "

set-option -g pane-border-style "fg=#6a6b6c"
set-option -g pane-active-border-style "fg=#a8ded7"
set-option -g message-style "bg=#2a2b2c,fg=#ffffff"
